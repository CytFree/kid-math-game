<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>🐾 动物数学岛</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 音效控制 -->
<button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

<!-- 角色创建 -->
<div class="screen" id="create-screen">
  <div class="create-card">
    <h1>🏝️ 动物数学岛</h1>
    <div class="sub">帮小动物解题，开始冒险吧！</div>
    <div class="avatar-choose" id="avatarChoose">
      <div class="avatar-opt selected" data-a="boy" onclick="pickAvatar(this)">👦</div>
      <div class="avatar-opt" data-a="girl" onclick="pickAvatar(this)">👧</div>
      <div class="avatar-opt" data-a="bear" onclick="pickAvatar(this)">🐻</div>
      <div class="avatar-opt" data-a="cat" onclick="pickAvatar(this)">🐱</div>
    </div>
    <input class="name-input" id="nameInput" type="text" placeholder="输入你的名字" maxlength="8">
    <button class="btn start-btn" onclick="startGame()">开始冒险 🚀</button>
  </div>
</div>

<!-- 岛屿首页 -->
<div class="screen" id="island-screen">
  <div class="hud">
    <div class="hud-left">
      <span class="hud-name" id="hudName">小宝</span>
      <span class="hud-level" id="hudLevel">Lv.1</span>
    </div>
    <div class="hud-xp-wrap"><div class="hud-xp-bar" id="hudXp" style="width:0%"></div></div>
    <span class="hud-coins" id="hudCoins">💰0</span>
    <span class="hud-pet" id="hudPet"></span>
    <button class="hud-task-btn" onclick="showPets()" style="font-size:18px;background:none;border:none;cursor:pointer">🐾</button>
    <button class="hud-task-btn" id="hudStoryBtn" onclick="showAvailableStory()" style="font-size:18px;background:none;border:none;cursor:pointer;display:none">📖</button>
    <button class="hud-task-btn" onclick="showDecoPanel()" style="font-size:18px;background:none;border:none;cursor:pointer">🏠</button>
  </div>
  <div class="island-scene" id="islandScene">
    <div class="sun"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="island-ground"></div>
    <div class="tree" style="left:20%;bottom:24%;font-size:42px">🌳</div>
    <div class="tree" style="left:62%;bottom:22%;font-size:40px">🌴</div>
    <div class="tree" style="left:42%;bottom:27%;font-size:38px">🌲</div>
    <div class="flower" style="left:12%;bottom:10%">🌸</div>
    <div class="flower" style="left:32%;bottom:8%">🌼</div>
    <div class="flower" style="left:52%;bottom:11%">🌺</div>
    <div class="flower" style="left:72%;bottom:9%">🌻</div>
    <div class="flower" style="left:88%;bottom:10%">🌷</div>
    <div class="area area-home" onclick="goArea('home')"><span class="area-icon">🏠</span><span class="area-label">家</span></div>
    <div class="area area-orchard locked" id="area-orchard" onclick="goArea('orchard')"><span class="area-icon">🌳</span><span class="area-label">果园</span></div>
    <div class="area area-beach locked" id="area-beach" onclick="goArea('beach')"><span class="area-icon">🏖️</span><span class="area-label">海滩</span></div>
    <div class="area area-park locked" id="area-park" onclick="goArea('park')"><span class="area-icon">🎪</span><span class="area-label">游乐场</span></div>
    <div class="area area-castle locked" id="area-castle" onclick="goArea('castle')"><span class="area-icon">🏰</span><span class="area-label">城堡</span></div>
    <div class="animal" style="left:10%;bottom:16%;animation:animalWalk 7s ease-in-out infinite" onclick="talk('cat')"><span id="badge-cat" class="badge">❗</span>🐱</div>
    <div class="animal" style="left:24%;bottom:18%;animation:animalWalk 9s ease-in-out infinite .5s" onclick="talk('dog')"><span id="badge-dog" class="badge">❗</span>🐶</div>
    <div class="animal" style="left:36%;bottom:15%;animation:animalWalk 8s ease-in-out infinite 1s" onclick="talk('rabbit')"><span id="badge-rabbit" class="badge">❗</span>🐰</div>
    <div class="animal" style="left:52%;bottom:17%;animation:animalWalk 10s ease-in-out infinite 2s" onclick="talk('bear')"><span id="badge-bear" class="badge">❗</span>🐻</div>
    <div class="animal" style="left:68%;bottom:14%;animation:animalWalk 7.5s ease-in-out infinite 1.5s" onclick="talk('fox')"><span id="badge-fox" class="badge">❗</span>🦊</div>
    <div class="animal" style="left:80%;bottom:16%;animation:animalWalk 8.5s ease-in-out infinite 3s" onclick="talk('panda')"><span id="badge-panda" class="badge">❗</span>🐼</div>
    <div class="player player-idle" id="playerChar">👦</div>
  </div>
  </div>
</div>

<!-- 对话 -->
<div class="dialog-overlay" id="dialogOv" onclick="if(event.target===this)closeDlg()">
  <div class="dialog-box" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-avatar" id="dAvatar">🐱</span>
      <span class="dialog-name" id="dName">小橘</span>
    </div>
    <div class="dialog-text" id="dText"></div>
    <div class="dialog-emoji" id="dEmoji"></div>
    <button class="btn dialog-btn" id="dAction" onclick="doTask()">我来帮你！💪</button>
    <button class="btn dialog-close" onclick="closeDlg()">下次吧</button>
  </div>
</div>

<!-- 故事任务 -->
<div class="story-overlay" id="storyOv" onclick="if(event.target===this)closeStory()">
  <div class="story-card" onclick="event.stopPropagation()">
    <div class="story-icon" id="stIcon">📖</div>
    <div class="story-chapter" id="stChapter">第一章</div>
    <div class="story-title" id="stTitle">故事标题</div>
    <div class="story-text" id="stText">故事内容...</div>
    <div class="story-progress" id="stProg"></div>
    <button class="btn story-btn" id="stAction" onclick="doStoryTask()">开始挑战 💪</button>
    <button class="btn story-skip" onclick="closeStory()">下次再听</button>
    <div id="stComplete" style="display:none"></div>
  </div>
</div>

<!-- 装饰商店 -->
<div class="deco-panel" id="decoPanel" onclick="if(event.target===this)closeDecoPanel()">
  <div class="deco-bg"></div>
  <div class="deco-card" onclick="event.stopPropagation()">
    <div class="deco-handle"></div>
    <div class="deco-header">
      <span class="deco-title">🏠 装饰商店</span>
      <span class="deco-coins" id="decoCoins">💰0</span>
      <button class="deco-close" onclick="closeDecoPanel()">✕</button>
    </div>
    <div class="deco-tabs">
      <button class="deco-tab active" onclick="switchDecoTab('shop')">🛒 商店</button>
      <button class="deco-tab" onclick="switchDecoTab('owned')">📦 已拥有</button>
      <button class="deco-tab" onclick="switchDecoTab('placed')">📍 已放置</button>
    </div>
    <div class="deco-grid" id="decoGrid"></div>
    <div class="deco-placed-info" id="decoInfo">点击装饰放置到岛上，点击已放置的装饰可移除</div>
  </div>
</div>

<!-- 题目 -->
<div class="screen" id="q-screen">
  <div class="q-header">
    <button class="q-back" onclick="exitQ()">✕ 退出</button>
    <span class="q-title" id="qTitle">帮小橘解题</span>
    <span style="width:50px"></span>
  </div>
  <div class="q-progress" id="qProg"></div>
  <div class="q-card">
    <div class="q-bubble">
      <div class="q-animal" id="qAnimal">🐱</div>
      <div class="q-speech" id="qStory"></div>
    </div>
    <div class="q-visual" id="qVis"></div>
    <div class="q-equation" id="qEq"></div>
    <div class="q-options" id="qOpts"></div>
    <div class="q-fb" id="qFb"></div>
  </div>
</div>

<!-- 冒险列表 -->
<div class="screen" id="adv-list-screen">
  <div class="al-header">
    <button class="q-back" onclick="show('island-screen')">✕ 返回</button>
    <span class="q-title">⚔️ 冒险故事</span>
    <span style="width:50px"></span>
  </div>
  <div class="al-list" id="alList"></div>
</div>

<!-- 冒险地图 -->
<div class="screen" id="adventure-screen">
  <div class="av-header">
    <button class="q-back" onclick="exitAdv()">✕ 退出</button>
    <span class="q-title" id="avTitle">小橘的钓鱼日</span>
    <span style="width:50px"></span>
  </div>
  <div class="av-map" id="avMap"></div>
</div>

<!-- 宠物 -->
<div class="screen" id="pet-screen">
  <div class="p-header">
    <button class="q-back" onclick="show('island-screen')">✕ 返回</button>
    <span class="q-title">🐾 宠物小屋</span>
    <span style="width:50px"></span>
  </div>
  <div class="p-house"><div class="p-grid" id="pGrid"></div></div>
</div>

<!-- 区域：果园 -->
<div class="screen" id="orchard-screen">
  <div class="area-ground"></div>
  <div class="area-screen-header">
    <span class="area-screen-emoji">🌳</span>
    <span class="area-screen-title">果园</span>
  </div>
  <div class="area-animals">
    <div class="area-animal" onclick="enterAreaTask('rabbit')"><span class="area-badge" id="area-badge-rabbit">❗</span>🐰<span class="area-animal-name">跳跳</span></div>
    <div class="area-animal" onclick="enterAreaTask('bear')"><span class="area-badge" id="area-badge-bear">❗</span>🐻<span class="area-animal-name">团团</span></div>
  </div>
  <button class="btn area-back-btn" onclick="exitArea()">← 返回岛屿</button>
</div>

<!-- 区域：海滩 -->
<div class="screen" id="beach-screen">
  <div class="area-ground"></div>
  <div class="wave"></div>
  <div class="area-screen-header">
    <span class="area-screen-emoji">🏖️</span>
    <span class="area-screen-title">海滩</span>
  </div>
  <div class="area-animals">
    <div class="area-animal disabled">🐚<span class="area-animal-name">更多动物即将到来</span></div>
  </div>
  <button class="btn area-back-btn" onclick="exitArea()">← 返回岛屿</button>
</div>

<!-- 区域：游乐场 -->
<div class="screen" id="park-screen">
  <div class="area-ground"></div>
  <div class="area-screen-header">
    <span class="area-screen-emoji">🎪</span>
    <span class="area-screen-title">游乐场</span>
  </div>
  <div class="area-animals">
    <div class="area-animal" onclick="enterAreaTask('fox')"><span class="area-badge" id="area-badge-fox">❗</span>🦊<span class="area-animal-name">聪聪</span></div>
  </div>
  <button class="btn area-back-btn" onclick="exitArea()">← 返回岛屿</button>
</div>

<!-- 区域：城堡 -->
<div class="screen" id="castle-screen">
  <div class="area-ground"></div>
  <div class="star-bg"></div>
  <div class="area-screen-header">
    <span class="area-screen-emoji">🏰</span>
    <span class="area-screen-title">城堡</span>
  </div>
  <div class="area-animals">
    <div class="area-animal" onclick="enterAreaTask('panda')"><span class="area-badge" id="area-badge-panda">❗</span>🐼<span class="area-animal-name">圆圆</span></div>
  </div>
  <button class="btn area-back-btn" onclick="exitArea()">← 返回岛屿</button>
</div>

<!-- 升级 -->
<div class="lu-overlay" id="luOv">
  <div class="lu-card">
    <h2>🎉 升级了！</h2>
    <div class="lu-title" id="luLv">Lv.2</div>
    <div class="lu-detail" id="luDetail"></div>
    <button class="btn lu-btn" onclick="closeLu()">继续冒险 🎮</button>
  </div>
</div>

<div class="fw" id="fw"></div>

<script src="game-data.js"></script>
<script src="game.js"></script>
</body>
</html>
